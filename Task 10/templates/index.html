<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM ChatBot 🤖</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(99,102,241,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139,92,246,0.12) 0%, transparent 60%);
    }

    /* ── Header ──────────────────────────────────── */
    .app-header {
      text-align: center;
      margin-bottom: 1.2rem;
    }
    .app-header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .app-header p {
      color: #6b7280;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    /* ── Chat Card ───────────────────────────────── */
    .chat-card {
      width: 100%;
      max-width: 760px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      backdrop-filter: blur(24px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(99,102,241,0.08);
    }

    /* ── Chat Topbar ─────────────────────────────── */
    .chat-topbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.4rem;
      background: rgba(99,102,241,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .avatar-bot {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(99,102,241,0.5);
    }
    .bot-info { flex: 1; }
    .bot-info .name { font-weight: 600; color: #e2e8f0; font-size: 0.95rem; }
    .bot-info .status {
      font-size: 0.72rem; color: #10b981;
      display: flex; align-items: center; gap: 4px; margin-top: 2px;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #10b981;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }
    .topic-badge {
      background: rgba(99,102,241,0.18);
      border: 1px solid rgba(99,102,241,0.3);
      color: #818cf8;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 999px;
    }

    /* ── Chat Window ─────────────────────────────── */
    #chat-window {
      height: 420px;
      overflow-y: auto;
      padding: 1.2rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      scroll-behavior: smooth;
    }
    #chat-window::-webkit-scrollbar { width: 5px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb {
      background: rgba(99,102,241,0.3);
      border-radius: 999px;
    }

    /* ── Messages ─────────────────────────────────── */
    .msg-row {
      display: flex;
      gap: 0.6rem;
      animation: fadeSlide 0.25s ease;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user  { flex-direction: row-reverse; }
    .msg-row.bot   { flex-direction: row; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg-row.bot  .msg-avatar { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .msg-row.user .msg-avatar { background: linear-gradient(135deg, #10b981, #059669); }

    .msg-bubble {
      max-width: 70%;
      padding: 0.65rem 1rem;
      border-radius: 16px;
      font-size: 0.88rem;
      line-height: 1.55;
      word-break: break-word;
    }

    /* User bubble — teal/green */
    .msg-row.user .msg-bubble {
      background: linear-gradient(135deg, #059669, #10b981);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 12px rgba(16,185,129,0.25);
    }

    /* Bot bubble — indigo/violet */
    .msg-row.bot .msg-bubble {
      background: rgba(99,102,241,0.14);
      border: 1px solid rgba(99,102,241,0.22);
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .msg-label {
      font-size: 0.68rem;
      font-weight: 600;
      margin-bottom: 3px;
      letter-spacing: 0.5px;
    }
    .msg-row.user .msg-label { color: rgba(255,255,255,0.7); text-align: right; }
    .msg-row.bot  .msg-label { color: #818cf8; }

    /* ── Typing Indicator ────────────────────────── */
    .typing-indicator {
      display: flex; align-items: center; gap: 4px;
      padding: 0.6rem 0.9rem;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 14px;
      width: fit-content;
    }
    .typing-indicator span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #818cf8;
      animation: typingBounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30%           { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input Area ──────────────────────────────── */
    .chat-input-area {
      padding: 1rem 1.4rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.2);
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    #user-input {
      flex: 1;
      padding: 0.7rem 1rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #user-input::placeholder { color: #4b5563; }
    #user-input:focus {
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    #send-btn {
      padding: 0.7rem 1.3rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(99,102,241,0.35);
      display: flex; align-items: center; gap: 6px;
    }
    #send-btn:hover  { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(99,102,241,0.45); }
    #send-btn:active { transform: scale(0.97); }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ── Footer ──────────────────────────────────── */
    .chat-footer {
      text-align: center;
      padding: 0.55rem;
      font-size: 0.7rem;
      color: #374151;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 500px) {
      .app-header h1 { font-size: 1.5rem; }
      #chat-window   { height: 340px; }
      .msg-bubble    { max-width: 85%; font-size: 0.84rem; }
      .topic-badge   { display: none; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <h1>🤖 LLM ChatBot</h1>
    <p>Ask me anything about Large Language Models</p>
  </header>

  <!-- Chat Card -->
  <main class="chat-card" role="main">

    <!-- Top Bar -->
    <div class="chat-topbar">
      <div class="avatar-bot">🧠</div>
      <div class="bot-info">
        <div class="name">LLM Expert Bot</div>
        <div class="status"><span class="status-dot"></span> Online</div>
      </div>
      <span class="topic-badge">Large Language Models</span>
    </div>

    <!-- Messages -->
    <div id="chat-window" aria-live="polite" aria-label="Chat messages"></div>

    <!-- Input -->
    <div class="chat-input-area">
      <input
        id="user-input"
        type="text"
        placeholder="Ask about LLMs, GPT, BERT, transformers…"
        autocomplete="off"
        maxlength="300"
        aria-label="Message input"
      />
      <button id="send-btn" aria-label="Send message">
        Send <span>➤</span>
      </button>
    </div>

    <div class="chat-footer">Type <strong>bye</strong> or <strong>exit</strong> to end the session</div>
  </main>

  <!-- JS -->
  <script>
    const chatWindow  = document.getElementById('chat-window');
    const userInput   = document.getElementById('user-input');
    const sendBtn     = document.getElementById('send-btn');

    // ── Helpers ──────────────────────────────────
    function scrollBottom() {
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function appendMessage(sender, text) {
      const isUser = sender === 'User';
      const row = document.createElement('div');
      row.className = `msg-row ${isUser ? 'user' : 'bot'}`;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = isUser ? '🧑' : '🤖';

      const wrapper = document.createElement('div');

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = isUser ? 'You' : 'Bot';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;

      wrapper.appendChild(label);
      wrapper.appendChild(bubble);

      if (isUser) {
        row.appendChild(wrapper);
        row.appendChild(avatar);
      } else {
        row.appendChild(avatar);
        row.appendChild(wrapper);
      }

      chatWindow.appendChild(row);
      scrollBottom();
    }

    function showTyping() {
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.id = 'typing-row';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = '🤖';

      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.innerHTML = '<span></span><span></span><span></span>';

      row.appendChild(avatar);
      row.appendChild(indicator);
      chatWindow.appendChild(row);
      scrollBottom();
    }

    function hideTyping() {
      const el = document.getElementById('typing-row');
      if (el) el.remove();
    }

    function disableChat(message) {
      userInput.disabled = true;
      sendBtn.disabled   = true;
      userInput.placeholder = message || 'Session ended.';
    }

    // ── Send Message ──────────────────────────────
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      appendMessage('User', text);
      userInput.value = '';
      sendBtn.disabled = true;
      showTyping();

      try {
        const res  = await fetch(`/get?msg=${encodeURIComponent(text)}`);
        const data = await res.json();

        // Small delay to make typing indicator feel natural
        await new Promise(r => setTimeout(r, 600));
        hideTyping();
        appendMessage('Bot', data.response);

        if (data.terminate) {
          disableChat('Session ended. Refresh to start again.');
        } else {
          sendBtn.disabled = false;
          userInput.focus();
        }
      } catch (err) {
        hideTyping();
        appendMessage('Bot', '⚠️ Connection error. Please try again.');
        sendBtn.disabled = false;
      }
    }

    // ── Event Listeners ───────────────────────────
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
    });

    // ── Welcome Message ───────────────────────────
    window.addEventListener('load', () => {
      setTimeout(() => {
        appendMessage('Bot', "👋 Hello! I'm your LLM Expert Bot. Ask me anything about Large Language Models — GPT, BERT, transformers, training, hallucinations, and more!");
      }, 300);
    });
  </script>
</body>
</html>
